appId: com.TingMo.app
productName: TingMo
copyright: Copyright © 2025
directories:
  output: release
  buildResources: assets
files:
  - dist
  - dist-electron
  - package.json
asar: true
asarUnpack:
  - node_modules/onnxruntime-node/**
  - node_modules/koffi/**
  - node_modules/sherpa-onnx/**
publish:
  provider: github
  owner: shaoxin12
  repo: tingmo
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icons/icon.ico
  # Code signing — set CSC_LINK and CSC_KEY_PASSWORD env vars or configure here
  # certificateFile: path/to/cert.pfx
  # certificatePassword: your-password
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: TingMo
  artifactName: "TingMo-Setup-${version}.${ext}"
